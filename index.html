<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kho ảnh</title>

<style>
body{
    font-family:Arial;
    text-align:center;
}

img{
    max-width:300px;
    margin:10px;
    border:1px solid #ccc;
}
</style>

</head>
<body>

<h1>Kho ảnh</h1>

<div id="gallery"></div>

<script>

const user = "kittythecat019";
const repo = "kitty-web-images";

fetch(`https://api.github.com/repos/${user}/${repo}/contents/images`)
.then(r => r.json())
.then(files => {

    let gallery = document.getElementById("gallery");

    files.forEach(file => {

        if(file.type === "file"){

            let img = document.createElement("img");

            img.src = file.download_url;

            gallery.appendChild(img);

        }

    });

});

</script>

</body>
</html>
