<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kho ảnh</title>

<style>
body{
    font-family:Arial;
    padding:20px;
}

.item{
    border:1px solid #ccc;
    padding:10px;
    margin-bottom:15px;
}

img{
    max-width:200px;
    display:block;
    margin-bottom:10px;
}

input{
    width:80%;
}

button{
    margin-left:5px;
}
</style>
</head>
<body>

<h1>Kho ảnh</h1>

<div id="gallery"></div>

<script>

const user = "kittythecat019";
const repo = "kitty-web-images";

fetch(`https://api.github.com/repos/${user}/${repo}/contents/images`)
.then(r => r.json())
.then(files => {

    const gallery = document.getElementById("gallery");

    files.forEach(file => {

        if(file.type !== "file") return;

        const imageUrl =
        `https://${user}.github.io/${repo}/images/${file.name}`;

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <img src="${imageUrl}">
            <b>${file.name}</b><br><br>

            <input
                id="link-${file.name}"
                value="${imageUrl}"
                readonly>

            <button onclick="copyLink('link-${file.name}')">
                Copy Link
            </button>
        `;

        gallery.appendChild(div);

    });

});

function copyLink(id){

    const input = document.getElementById(id);

    navigator.clipboard.writeText(input.value);

    alert("Đã copy link!");

}

</script>

</body>
</html>
